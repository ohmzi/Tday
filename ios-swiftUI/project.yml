name: TdayApp

options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"

packages:
  sentry-cocoa:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.45.0

targets:
  Tday:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tday
        excludes:
          - Info.plist
    dependencies:
      - package: sentry-cocoa
        product: Sentry-Dynamic
      - target: TdayWidget
      # Embedded app extension. On-device builds need its own App ID
      # (com.ohmz.tday.ios.ShareExtension) with the group.com.ohmz.tday App
      # Groups capability registered — Xcode's automatic signing handles this
      # the first time you select the team under Signing & Capabilities.
      - target: TdayShareExtension
    settings:
      base:
        PRODUCT_NAME: Tday
        PRODUCT_BUNDLE_IDENTIFIER: com.ohmz.tday.ios
        DEVELOPMENT_TEAM: THT5Z8K3TF
        INFOPLIST_FILE: Tday/Info.plist
        CODE_SIGN_ENTITLEMENTS: Tday/Tday.entitlements
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: 5.0
        CURRENT_PROJECT_VERSION: 10
        MARKETING_VERSION: 0.5.0
        SENTRY_DSN: ""
        SENTRY_TRACES_SAMPLE_RATE: "0.2"
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
  TdayWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TdayWidget
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_NAME: TdayWidget
        PRODUCT_BUNDLE_IDENTIFIER: com.ohmz.tday.ios.TodayTasksWidget
        DEVELOPMENT_TEAM: THT5Z8K3TF
        INFOPLIST_FILE: TdayWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: TdayWidget/TdayWidget.entitlements
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: 5.0
        CURRENT_PROJECT_VERSION: 10
        MARKETING_VERSION: 0.5.0
        TARGETED_DEVICE_FAMILY: 1
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
  TdayShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TdayShareExtension
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_NAME: TdayShareExtension
        PRODUCT_BUNDLE_IDENTIFIER: com.ohmz.tday.ios.ShareExtension
        DEVELOPMENT_TEAM: THT5Z8K3TF
        INFOPLIST_FILE: TdayShareExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: TdayShareExtension/TdayShareExtension.entitlements
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: 5.0
        CURRENT_PROJECT_VERSION: 10
        MARKETING_VERSION: 0.5.0
        TARGETED_DEVICE_FAMILY: 1
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
  TdayTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/TdayCoreTests
    dependencies:
      - target: Tday
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ohmz.tday.ios.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Tday:
    build:
      targets:
        Tday: all
        TdayTests: [test]
    test:
      targets:
        - TdayTests
    run:
      config: Debug
    archive:
      config: Release

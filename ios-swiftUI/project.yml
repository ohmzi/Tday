name: TdayApp

options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"

packages:
  sentry-cocoa:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.45.0

targets:
  Tday:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tday
        excludes:
          - Info.plist
    dependencies:
      - package: sentry-cocoa
        product: Sentry-Dynamic
    settings:
      base:
        PRODUCT_NAME: Tday
        PRODUCT_BUNDLE_IDENTIFIER: com.ohmz.tday.ios
        DEVELOPMENT_TEAM: THT5Z8K3TF
        INFOPLIST_FILE: Tday/Info.plist
        CODE_SIGN_ENTITLEMENTS: Tday/Tday.entitlements
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: 5.0
        CURRENT_PROJECT_VERSION: 6
        MARKETING_VERSION: 0.1.5
        SENTRY_DSN: ""
        SENTRY_TRACES_SAMPLE_RATE: "0.2"
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
  TdayTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/TdayCoreTests
    dependencies:
      - target: Tday
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ohmz.tday.ios.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Tday:
    build:
      targets:
        Tday: all
        TdayTests: [test]
    test:
      targets:
        - TdayTests
    run:
      config: Debug
    archive:
      config: Release

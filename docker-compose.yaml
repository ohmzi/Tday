services:
  database:
    image: postgres:15
    container_name: tday_db
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 1s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypass
      POSTGRES_DB: mydb
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    pull_policy: always
    container_name: tday_ollama
    profiles: ["ai"]
    restart: always
    gpus: all
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 10s
      retries: 5
    volumes:
      - ollama_data:/root/.ollama

  ollama-model-setup:
    image: ollama/ollama:latest
    pull_policy: always
    container_name: tday_ollama_model_setup
    profiles: ["ai"]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5:0.8b}
    command: >
      sh -c "ollama pull \"$${OLLAMA_MODEL}\" &&
      (ollama rm qwen2.5:0.5b || true)"

  tday-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: tday-backend:latest
    container_name: tday_backend
    restart: always
    ports:
      - "${TDAY_HOST_BIND:-127.0.0.1}:${TDAY_HOST_PORT:-2525}:8080"
    env_file:
      - .env.docker
    environment:
      # Container timezone. Defaults to UTC; set TZ in the root .env to your
      # local zone (e.g. America/New_York) so log timestamps and any
      # server-local time logic line up with the host. IANA names only.
      TZ: ${TZ:-UTC}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-THT5Z8K3TF}
      IOS_BUNDLE_ID: ${IOS_BUNDLE_ID:-com.ohmz.tday.ios}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5:0.8b}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      database:
        condition: service_healthy

volumes:
  postgres_data:
  ollama_data:

name: Build & Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/ohmzi/tday

jobs:
  lint-and-test:
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tday-web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: tday-web

      - name: Lint frontend
        run: npm run lint
        working-directory: tday-web

      - name: Run frontend tests
        run: npm run test
        working-directory: tday-web
        env:
          TZ: UTC

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run backend tests
        run: ./gradlew :tday-backend:test --no-daemon

  build-and-release:
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./tday-web/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          PREVIOUS=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "previous=$PREVIOUS" >> "$GITHUB_OUTPUT"

      - name: Generate release metadata
        run: |
          node ./scripts/generate-release-metadata.mjs \
            --version "${{ steps.version.outputs.version }}" \
            --previous "${{ steps.version.outputs.previous }}" \
            --current-output ./tday-web/public/release/current-release.json \
            --latest-output ./tday-web/public/release/latest-changes.json \
            --body-output ./body.md \
            --repository "${{ github.repository }}"

      - name: Commit release metadata locally
        id: release_metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tday-web/public/release/current-release.json tday-web/public/release/latest-changes.json

          if git diff --cached --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore(release): update release metadata for ${{ steps.version.outputs.tag }} [skip release]"
          echo "committed=true" >> "$GITHUB_OUTPUT"

      # ────────────────────────────────────────────
      #  Docker Image
      # ────────────────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/ohmzi/Tday
            org.opencontainers.image.description=Tday - Personal task planner
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ────────────────────────────────────────────
      #  Android APK
      # ────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 || secrets.TWA_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Missing Android release keystore. Configure RELEASE_KEYSTORE_BASE64 or TWA_KEYSTORE_BASE64."
            exit 1
          fi

          echo "$KEYSTORE_BASE64" | base64 --decode > /tmp/release.keystore
          echo "RELEASE_KEYSTORE_PATH=/tmp/release.keystore" >> "$GITHUB_ENV"

      - name: Detect Android signing alias
        env:
          RELEASE_KEY_ALIAS_VALUE: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD || secrets.TWA_STORE_PASSWORD }}
        run: |
          if [ -n "$RELEASE_KEY_ALIAS_VALUE" ]; then
            echo "RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS_VALUE" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ -z "$RELEASE_KEYSTORE_PASSWORD" ]; then
            echo "::error::Missing Android keystore password. Configure RELEASE_KEYSTORE_PASSWORD or TWA_STORE_PASSWORD."
            exit 1
          fi

          mapfile -t KEY_ALIASES < <(
            keytool -list -keystore /tmp/release.keystore -storepass "$RELEASE_KEYSTORE_PASSWORD" 2>/dev/null \
              | awk -F, '/^[^[:space:]][^,]*,[[:space:]]/{print $1}'
          )

          if [ "${#KEY_ALIASES[@]}" -ne 1 ]; then
            echo "::error::Could not determine a unique Android key alias from the release keystore. Set RELEASE_KEY_ALIAS."
            exit 1
          fi

          echo "RELEASE_KEY_ALIAS=${KEY_ALIASES[0]}" >> "$GITHUB_ENV"

      - name: Build Android APK
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD || secrets.TWA_STORE_PASSWORD }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD || secrets.TWA_KEY_PASSWORD }}
        run: ./gradlew :android-compose:app:assembleRelease --no-daemon

      - name: Prepare APK for release
        id: apk
        run: |
          APK=$(find android-compose/app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -n "$APK" ]; then
            DEST="tday-${{ steps.version.outputs.tag }}.apk"
            cp "$APK" "$DEST"
            echo "file=$DEST" >> "$GITHUB_OUTPUT"
            echo "Found APK: $APK → $DEST"
          else
            echo "No APK found in release output"
          fi

      # ────────────────────────────────────────────
      #  Tag & Release
      # ────────────────────────────────────────────
      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS=("${{ steps.version.outputs.tag }}" --title "${{ steps.version.outputs.tag }}" --notes-file body.md)
          if [ -f "${{ steps.apk.outputs.file }}" ]; then
            ARGS+=("${{ steps.apk.outputs.file }}")
          fi
          gh release create "${ARGS[@]}"

      - name: Publish release metadata to master
        if: ${{ steps.release_metadata.outputs.committed == 'true' }}
        run: |
          git push origin HEAD:master

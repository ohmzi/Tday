name: PR Gate

on:
  pull_request:
    branches: [master]

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Only allow PRs from develop
        run: |
          if [ "${{ github.head_ref }}" != "develop" ]; then
            echo "::error::PRs to master are only allowed from the develop branch."
            exit 1
          fi
          echo "Source branch is develop — allowed."

  lint-and-test:
    runs-on: ubuntu-latest
    needs: check-source-branch
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tday-web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: tday-web

      - name: Lint frontend
        run: npm run lint
        working-directory: tday-web

      - name: Run frontend tests
        run: npm run test
        working-directory: tday-web
        env:
          TZ: UTC

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run backend tests
        run: ./gradlew :tday-backend:test --no-daemon

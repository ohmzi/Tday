name: PR Gate

on:
  pull_request:
    branches: [master]

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Only allow PRs from develop
        run: |
          if [ "${{ github.head_ref }}" != "develop" ]; then
            echo "::error::PRs to master are only allowed from the develop branch."
            exit 1
          fi
          echo "Source branch is develop — allowed."

  lint-and-test:
    runs-on: ubuntu-latest
    needs: check-source-branch
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tday-web/package-lock.json

      - name: Check version mirrors
        run: node scripts/version.mjs check

      - name: Install frontend dependencies
        run: npm ci
        working-directory: tday-web

      - name: Lint frontend
        run: npm run lint
        working-directory: tday-web

      - name: Run frontend tests
        run: npm run test
        working-directory: tday-web
        env:
          TZ: UTC

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: 21

      - name: Run backend tests
        run: ./gradlew :tday-backend:test --no-daemon

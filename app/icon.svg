<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Calendar body (teal header) -->
  <rect x="18" y="30" width="92" height="80" rx="12" fill="#90D5D2"/>

  <!-- White content area -->
  <path d="M18,54 L110,54 L110,98 A12,12 0 0,1 98,110 L30,110 A12,12 0 0,1 18,98 Z" fill="#FFFFFF"/>

  <!-- Dark teal border -->
  <rect x="18" y="30" width="92" height="80" rx="12" stroke="#2D6B6B" stroke-width="4.5" fill="none"/>

  <!-- Header divider -->
  <line x1="18" y1="54" x2="110" y2="54" stroke="#2D6B6B" stroke-width="3"/>

  <!-- Binder ring 1 -->
  <path d="M40,36 V22 A8,9 0 0,1 56,22 V36" stroke="#2D6B6B" stroke-width="5.5" stroke-linecap="round" fill="none"/>

  <!-- Binder ring 2 -->
  <path d="M56,36 V22 A8,9 0 0,1 72,22 V36" stroke="#2D6B6B" stroke-width="5.5" stroke-linecap="round" fill="none"/>

  <!-- Binder ring 3 -->
  <path d="M72,36 V22 A8,9 0 0,1 88,22 V36" stroke="#2D6B6B" stroke-width="5.5" stroke-linecap="round" fill="none"/>

  <!-- Row 1: text lines -->
  <line x1="28" y1="66" x2="48" y2="66" stroke="#BABABA" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="28" y1="73" x2="42" y2="73" stroke="#BABABA" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Row 2: text lines -->
  <line x1="28" y1="84" x2="48" y2="84" stroke="#BABABA" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="28" y1="91" x2="42" y2="91" stroke="#BABABA" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Row 3: text lines -->
  <line x1="28" y1="101" x2="48" y2="101" stroke="#BABABA" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Row 1 squares -->
  <rect x="58" y="60" width="12" height="12" rx="2" fill="#E85B6F"/>
  <rect x="74" y="60" width="12" height="12" rx="2" fill="#E85B6F"/>
  <rect x="90" y="60" width="12" height="12" rx="2" fill="#E85B6F"/>

  <!-- Row 2 squares -->
  <rect x="58" y="78" width="12" height="12" rx="2" fill="#E85B6F"/>
  <rect x="74" y="78" width="12" height="12" rx="2" fill="#E85B6F"/>
  <rect x="90" y="78" width="12" height="12" rx="2" fill="#E85B6F"/>

  <!-- Row 3 squares -->
  <rect x="58" y="96" width="12" height="12" rx="2" fill="#E85B6F"/>
  <rect x="74" y="96" width="12" height="12" rx="2" fill="#E85B6F"/>
  <rect x="90" y="96" width="12" height="12" rx="2" fill="#E85B6F"/>
</svg>
